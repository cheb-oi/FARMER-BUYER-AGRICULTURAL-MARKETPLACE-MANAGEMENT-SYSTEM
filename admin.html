<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN DASHBOARD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <h2> Admin Panel</h2>
            <ul>
                <li><a href="#">Dashboard</a></li>
                <li><a href="#">Farmers</a></li>
                <li><a href="#">Buyers</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">Orders</a></li>
                <li><a href="#">Reports</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </div>
        <div class="content">
            <h1>Welcome Administrator</h1>
            <div class="cards">
                <div class="card">
                    <h2>Farmers</h2>
                    <p>150 registered</p>
                </div>
                <div class="card">
                    <h2>Buyers</h2>
                    <p>200 registered</p>
                </div>
                <div class="card">
                    <h2>Products</h2>
                    <p>50 available</p>
                </div>
                <div class="card">
                    <h2>Orders</h2>
                    <p>75 completed</p>
                    <p>25 pending</p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
